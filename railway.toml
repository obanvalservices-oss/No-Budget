# Build runs Prisma generate during npm run build

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "/bin/sh -lc 'echo RUNNING_MIGRATIONS; npx prisma migrate deploy --schema=./prisma/schema.prisma; echo STARTING_NODE; exec node dist/main.js'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
