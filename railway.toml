# Railway: add Postgres (or point env vars at Supabase). Mirror variables from .env.example.
# Nixpacks runs `npm run build` by default when a build script exists.

[build]
builder = "nixpacks"

[deploy]
startCommand = "npx prisma generate && npx prisma migrate deploy && npm run start:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
