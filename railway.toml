# Railway: add Postgres (or point env vars at Supabase). Mirror variables from .env.example.
# Nixpacks runs `npm run build` by default when a build script exists.

[build]
builder = "nixpacks"

[deploy]
startCommand = "npx prisma generate --schema=./prisma/schema.prisma && npx prisma migrate deploy --schema=./prisma/schema.prisma && npm run start:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
