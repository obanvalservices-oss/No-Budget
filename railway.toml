# Build runs Prisma generate (see package.json `build`). Start must not use `nest start` — use `npm start` → node dist/main.js.

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npx prisma migrate deploy --schema=./prisma/schema.prisma && node dist/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
