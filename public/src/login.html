<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f1419" />
  <title>Iniciar sesión — No Budget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard-shell.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="dashboard-body module-home nb-public">
  <header class="header">
    <div class="header-brand">
      <a href="index.html" class="brand-mark" aria-label="No Budget — Inicio">
        <img class="brand-logo" src="/assets/logo_budget.png" alt="" width="32" height="32" decoding="async" />
        <span class="brand-text">No Budget</span>
      </a>
    </div>
    <nav class="menu" aria-label="Cuenta">
      <ul>
        <li><a href="index.html" class="nav-link" data-nav="home">Inicio</a></li>
        <li><a href="register.html" class="nav-link" data-nav="signup">Crear cuenta</a></li>
      </ul>
    </nav>
  </header>

  <main class="nb-auth-main">
    <div class="auth-card">
      <h1>Iniciar sesión</h1>
      <p class="auth-lead">Ingresá con tu correo y contraseña para abrir tu panel.</p>
      <form id="loginForm">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required autocomplete="email" />

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />

        <button type="submit">Entrar</button>
      </form>

      <p class="switch-auth">
        ¿No tenés cuenta? <a href="register.html">Registrate</a>
      </p>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 No Budget · Finanzas personales</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/src/js/auth.js"></script>
  <script src="/src/js/login.js"></script>
</body>
</html>
