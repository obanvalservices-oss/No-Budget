<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0f1419" />
  <title>Gastos - No Budget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/css/dashboard-shell.css" />
  <link rel="stylesheet" href="/src/css/gastos.css" />
</head>
<body class="dashboard-body module-gastos">
  <header class="header">
    <div class="header-brand">
      <a href="home.html" class="brand-mark" aria-label="No Budget — Dashboard">
        <img class="brand-logo" src="/assets/logo_budget.png" alt="" width="32" height="32" decoding="async" />
        <span class="brand-text">No Budget</span>
      </a>
    </div>
    <nav class="menu" aria-label="Módulos">
      <ul>
        <li><a href="home.html" class="nav-link" data-nav="home">Dashboard</a></li>
        <li><a href="ingresos.html" class="nav-link" data-nav="ingresos">Ingresos</a></li>
        <li><a href="gastos.html" class="nav-link active" data-nav="gastos">Gastos</a></li>
        <li><a href="deudas.html" class="nav-link" data-nav="deudas">Deudas</a></li>
        <li><a href="ahorros.html" class="nav-link" data-nav="ahorros">Ahorros</a></li>
        <li><a href="inversiones.html" class="nav-link" data-nav="inversiones">Inversiones</a></li>
        <li><a href="compartido.html" class="nav-link" data-nav="compartido">Compartido</a></li>
        <li><a href="settings.html" class="nav-link" data-nav="settings">Configuración</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="form-section">
      <h2 class="nb-section-title">Registrar gasto</h2>
      <form id="gastosForm">
        <label for="descripcionGasto">Descripción</label>
        <input type="text" id="descripcionGasto" required />

        <div class="nb-categoria-field">
          <label for="categoriaGasto">Categoría</label>
          <select id="categoriaGasto" data-modulo="GASTOS" required aria-describedby="categoriaGastoHint">
            <option value="">Selecciona categoría</option>
          </select>
          <p id="categoriaGastoHint" class="nb-categoria-hint">
            Los gastos usan categorías con ID en el sistema. Podés crear una nueva y quedará seleccionada al guardar.
          </p>
          <input
            type="text"
            id="nuevaCategoriaInput"
            class="nb-categoria-nueva"
            placeholder="Nombre de la nueva categoría"
            autocomplete="off"
            aria-label="Nombre de la nueva categoría"
          />
        </div>

        <label for="montoGasto">Monto ($)</label>
        <input type="number" id="montoGasto" step="0.01" min="0.01" required />

        <label for="frecuenciaGasto">Frecuencia</label>
        <select id="frecuenciaGasto" required>
          <option value="">Selecciona</option>
          <option value="una_vez">Una vez</option>
          <option value="semanal">Semanal</option>
          <option value="mensual">Mensual</option>
        </select>

        <label for="fechaPagoGasto">Fecha de pago</label>
        <input type="date" id="fechaPagoGasto" required />

        <label for="origenGasto">Origen del dinero</label>
        <select id="origenGasto" required>
          <option value="">Selecciona origen</option>
          <option value="Banco">Banco</option>
          <option value="Fondo de ahorro">Fondo de ahorro</option>
          <option value="Ingreso fijo">Ingreso fijo</option>
        </select>

        <div class="checkbox-row">
          <input type="checkbox" id="fijoGasto" />
          <label for="fijoGasto">¿Es un gasto fijo?</label>
        </div>

        <button type="submit" class="btn-rojo">Guardar gasto</button>
      </form>
    </section>

    <section class="historial-section">
      <h2 class="nb-section-title">Historial de gastos</h2>
      <div id="historialGastos" class="historial-lista">
        <!-- Gastos renderizados dinámicamente aquí -->
      </div>
    </section>
  </main>

  <div id="modalEditarGasto" class="modal-editar" style="display: none" aria-hidden="true">
    <div class="modal-contenido">
      <h3>Editar gasto</h3>
      <form id="formEditarGasto">
        <input type="hidden" id="editGastoId" />
        <label for="editDescGasto">Descripción</label>
        <input type="text" id="editDescGasto" required />
        <label for="editMontoGasto">Monto ($)</label>
        <input type="number" id="editMontoGasto" step="0.01" min="0.01" required />
        <label for="editCatGasto">Categoría</label>
        <select id="editCatGasto" required></select>
        <label for="editFrecGasto">Frecuencia</label>
        <select id="editFrecGasto" required>
          <option value="una_vez">Una vez</option>
          <option value="semanal">Semanal</option>
          <option value="mensual">Mensual</option>
        </select>
        <label for="editFechaGasto">Fecha de pago</label>
        <input type="date" id="editFechaGasto" required />
        <label for="editOrigenGasto">Origen</label>
        <select id="editOrigenGasto" required>
          <option value="Banco">Banco</option>
          <option value="Fondo de ahorro">Fondo de ahorro</option>
          <option value="Ingreso fijo">Ingreso fijo</option>
        </select>
        <label class="chk-wrap"><input type="checkbox" id="editFijoGasto" /> Gasto fijo</label>
        <div class="botones-modal">
          <button type="submit" class="btn-rojo">Guardar cambios</button>
          <button type="button" id="btnCancelarEditGasto" class="btn-cancelar">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 No Budget</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/src/js/auth.js"></script>
  <script src="/src/js/nb-historial.js"></script>
  <script src="/src/js/gastos.js"></script>
</body>
</html>
